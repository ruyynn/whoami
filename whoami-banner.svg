    x="450"
    y="160"
    font-family="'Courier New', Courier, monospace"
    font-size="100"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="18"
    filter="url(#glow)"
    opacity="0.97"
  >WHOAMI</text>

  <!-- Subtle underline accent -->
  <rect x="160" y="172" width="580" height="2" rx="1" fill="white" opacity="0.12"/>

  <!-- Divider line bottom -->
  <line x1="50" y1="210" x2="850" y2="210" stroke="white" stroke-width="0.5" opacity="0.15"/>

  <!-- Bottom info row -->
  <text x="60" y="235" font-family="'Courier New', monospace" font-size="11" fill="white" opacity="0.35" letter-spacing="2">v1.3</text>
  <text x="450" y="235" font-family="'Courier New', monospace" font-size="11" fill="white" opacity="0.35" text-anchor="middle" letter-spacing="3">by ruyynn</text>
  <text x="840" y="235" font-family="'Courier New', monospace" font-size="11" fill="white" opacity="0.35" text-anchor="end" letter-spacing="2">github.com/ruyynn</text>

  <!-- Blinking cursor effect (static) -->
  <rect x="776" y="220" width="8" height="14" fill="white" opacity="0.5"/>

  <!-- Bottom tagline -->
  <text x="450" y="258" font-family="'Courier New', monospace" font-size="10" fill="white" opacity="0.2" text-anchor="middle" letter-spacing="5">FOR EDUCATIONAL &amp; AUTHORIZED USE ONLY</text>
