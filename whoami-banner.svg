<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <!-- Background gradient: very dark, almost black -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter for text -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Clip path -->
    <clipPath id="rounded">
      <rect width="900" height="280" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Scanline effect (horizontal lines) -->
  <g clip-path="url(#rounded)" opacity="0.04">
    <rect x="0" y="0" width="900" height="1" fill="white"/>
    <rect x="0" y="4" width="900" height="1" fill="white"/>
    <rect x="0" y="8" width="900" height="1" fill="white"/>
