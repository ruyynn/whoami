  <!-- Decorative corner brackets -->
  <!-- Top-left -->
  <polyline points="30,20 20,20 20,50" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <!-- Top-right -->
  <polyline points="870,20 880,20 880,50" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <!-- Bottom-left -->
  <polyline points="30,260 20,260 20,230" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <!-- Bottom-right -->
  <polyline points="870,260 880,260 880,230" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>

  <!-- Border -->
